<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="KAISER CO — Johann Kaiser, indépendant depuis 2012. Développement, intelligence artificielle, modélisation 3D, conseil. Paris.">
<title>KAISER//CO — Johann Kaiser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fraunces:ital,opsz,wght@0,144,300..900;1,144,300..900&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;500;700&family=Noto+Serif+SC:wght@300;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/",
    "wiggle": "https://cdn.jsdelivr.net/npm/wiggle/+esm"
  }
}
</script>
</head>
<body>

<!-- ── 1. HEADER FLOTTANT + SWITCHER LANGUE ─────────────────────────── -->
<header id="hdr" aria-label="Navigation">
    <a class="logo" href="#top" aria-label="KAISER CO — accueil">
        <span>KAISER</span><em>//</em><span>CO</span>
    </a>
    <nav>
        <a href="#manifeste" data-i18n="nav.manifesto">Manifeste</a>
        <a href="#services" data-i18n="nav.services">Services</a>
        <a href="#contact" data-i18n="nav.contact">Contact</a>
    </nav>
    <div class="lang-switcher" role="tablist" aria-label="Langue">
        <button data-lang="fr" aria-label="Français">FR</button>
        <button data-lang="en" aria-label="English">EN</button>
        <button data-lang="zh" aria-label="中文">中</button>
    </div>
</header>

<!-- ── 2. HERO ÉCLATÉ ───────────────────────────────────────────────── -->
<section id="top" class="hero">
    <h1 class="hero-text" id="hero-text">
        <span class="line l1" data-hero-line="0"></span>
        <span class="line l2" data-hero-line="1"></span>
        <span class="line l3" data-hero-line="2"></span>
        <span class="line l4" data-hero-line="3"></span>
        <span class="cursor" aria-hidden="true">_</span>
    </h1>
    <p class="hero-sub" data-i18n="hero.sub"></p>
    <div class="hero-mark" aria-hidden="true"></div>
</section>

<!-- ── 3. AVATAR 3D + FAQ ───────────────────────────────────────────── -->
<section id="avatar-section" aria-label="Pose-moi une question">
    <div class="avatar-headline">
        <h2 data-i18n="avatar.headline"></h2>
        <p data-i18n="avatar.sub"></p>
    </div>

    <div class="avatar-stage">
        <div id="kaiser-avatar-slot" class="avatar-slot">
            <div class="avatar-loading" data-i18n="avatar.loading"></div>
        </div>

        <ul id="faq-list" class="faq-list" aria-label="Questions fréquentes"></ul>
    </div>

    <button id="faq-stop" class="faq-stop" hidden data-i18n="avatar.stop"></button>
</section>

<!-- ── 4. MANIFESTO ─────────────────────────────────────────────────── -->
<section id="manifeste" class="manifesto">
    <p class="m-line m1" data-manifesto="0"></p>
    <p class="m-line m2" data-manifesto="1"></p>
    <p class="m-line m3" data-manifesto="2"></p>
    <p class="m-line m4" data-manifesto="3"></p>
</section>

<!-- ── 5. SERVICES ──────────────────────────────────────────────────── -->
<section id="services" class="services">
    <h2 class="services-title" data-i18n="services.title"></h2>

    <article class="srv srv-dev" data-srv="0">
        <div class="srv-img"><img src="./assets/img/service-dev.jpg" alt="" loading="lazy"></div>
        <div class="srv-body">
            <span class="srv-num">01</span>
            <h3 data-srv-h="0"></h3>
            <p class="srv-tag" data-srv-tag="0"></p>
            <p class="srv-desc" data-srv-desc="0"></p>
        </div>
    </article>

    <article class="srv srv-ia" data-srv="1">
        <div class="srv-img"><img src="./assets/img/service-ia.jpg" alt="" loading="lazy"></div>
        <div class="srv-body">
            <span class="srv-num">02</span>
            <h3 data-srv-h="1"></h3>
            <p class="srv-tag" data-srv-tag="1"></p>
            <p class="srv-desc" data-srv-desc="1"></p>
        </div>
    </article>

    <article class="srv srv-3d" data-srv="2">
        <div class="srv-img"><img src="./assets/img/service-3d.jpg" alt="" loading="lazy"></div>
        <div class="srv-body">
            <span class="srv-num">03</span>
            <h3 data-srv-h="2"></h3>
            <p class="srv-tag" data-srv-tag="2"></p>
            <p class="srv-desc" data-srv-desc="2"></p>
        </div>
    </article>

    <article class="srv srv-conseil" data-srv="3">
        <div class="srv-img"><img src="./assets/img/service-conseil.jpg" alt="" loading="lazy"></div>
        <div class="srv-body">
            <span class="srv-num">04</span>
            <h3 data-srv-h="3"></h3>
            <p class="srv-tag" data-srv-tag="3"></p>
            <p class="srv-desc" data-srv-desc="3"></p>
        </div>
    </article>
</section>

<!-- ── 6. À PROPOS ──────────────────────────────────────────────────── -->
<section class="about">
    <div class="about-text">
        <h2 data-i18n="about.name"></h2>
        <p data-i18n-html="about.p1"></p>
        <p class="about-meta" data-i18n="about.meta"></p>
    </div>
</section>

<!-- ── 7. CONTACT ───────────────────────────────────────────────────── -->
<section id="contact" class="contact">
    <p class="contact-label" data-i18n-html="contact.label"></p>
    <a class="contact-mail" href="mailto:johann.metagora@gmail.com">
        johann.metagora<wbr>@gmail.com
    </a>
    <p class="contact-note" data-i18n="contact.note"></p>
</section>

<!-- ── 8. FOOTER ────────────────────────────────────────────────────── -->
<footer>
    <div class="foot-left">
        <span data-i18n="footer.left1"></span><br>
        <span data-i18n="footer.left2"></span><br>
        <span data-i18n="footer.left3"></span>
    </div>
    <div class="foot-right">
        <span data-i18n="footer.right1"></span><br>
        <span data-i18n="footer.right2"></span>
    </div>
</footer>

<script type="module" src="./script.js"></script>
</body>
</html>
