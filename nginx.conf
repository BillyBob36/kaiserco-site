server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml model/gltf+json;

    # Long cache for static assets that have content-hash-like names or are stable.
    location ~* \.(woff2|jpg|jpeg|png|gif|ico|svg|gltf|bin|wav|mp3)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Shorter cache for HTML/JS/CSS so updates roll out fast.
    location ~* \.(html|js|css|json)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # Single-page fallback (we have only / but this is harmless).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't log healthcheck noise.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
